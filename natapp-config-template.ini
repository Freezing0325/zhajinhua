; natapp 配置文件模板
; 使用方法：
;   1. 复制此文件为 config.ini
;   2. 将下方的 authtoken 替换为你在 natapp.cn 获取的 token
;   3. 双击 natapp.exe 即可启动（config.ini 需与 natapp.exe 同目录）
;
; 如果你通过 start.js 启动（推荐），则不需要此文件，
; start.js 会通过 --authtoken 参数直接传递 token。

[default]
authtoken=你的authtoken填在这里
clienttoken=
log=none
loglevel=ERROR
http_proxy=
